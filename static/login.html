<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Generator Kreo</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-main: #0B0F19;
            --bg-card: rgba(19, 27, 46, 0.7);
            --border-color: rgba(31, 46, 84, 0.5);
            --border-hover: rgba(59, 80, 135, 0.8);
            --text-primary: #F0F4FA;
            --text-muted: #8E9CB2;
            --accent-cyan: #00F0FF;
            --accent-purple: #9F55FF;
            --accent-red: #FF4A6B;
            --font-sans: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --shadow-glow: 0 0 30px rgba(0, 240, 255, 0.15);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Abstract decorative background glows */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.1) 0%, rgba(0,0,0,0) 70%);
            top: -100px;
            left: -100px;
            z-index: 0;
        }

        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(159, 85, 255, 0.08) 0%, rgba(0,0,0,0) 70%);
            bottom: -150px;
            right: -100px;
            z-index: 0;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 1.5rem;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 2.5rem 2rem;
            box-shadow: var(--shadow-md);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-glow), var(--shadow-md);
        }

        .logo-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(0, 240, 255, 0.3));
            display: inline-block;
        }

        .logo-title {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: 0.03em;
        }

        .logo-title span {
            color: var(--accent-cyan);
        }

        .logo-subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            letter-spacing: 0.02em;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--text-muted);
            font-size: 0.95rem;
            pointer-events: none;
            transition: color 0.25s ease;
        }

        .form-input {
            width: 100%;
            background: rgba(11, 15, 25, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .form-input:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.15);
        }

        .form-input:focus + .input-icon {
            color: var(--accent-cyan);
        }

        .login-btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 2rem;
        }

        .login-btn:hover {
            filter: brightness(1.1);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .error-message {
            background: rgba(255, 74, 107, 0.1);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.65rem;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            50% { transform: translateX(6px); }
            75% { transform: translateX(-4px); }
        }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 1.5rem;
            letter-spacing: 0.01em;
        }

        .footer-note i {
            color: var(--accent-cyan);
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-header">
                <div class="logo-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <h1 class="logo-title">Generator <span>Kreo</span></h1>
                <p class="logo-subtitle">Авторизованный вход в панель генерации</p>
            </div>

            <div class="error-message" id="errorBlock">
                <i class="fa-solid fa-circle-exclamation"></i>
                <span id="errorText">Неверный логин или пароль</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Телефон или Логин</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="text" id="username" placeholder="Введите логин" required autocomplete="username">
                        <i class="fa-solid fa-phone input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Пароль</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="password" id="password" placeholder="Введите пароль" required autocomplete="current-password">
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span>Войти в систему</span>
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                </button>
            </form>
        </div>
        <div class="footer-note">
            Protected Workspace <i class="fa-solid fa-shield-halved"></i> avito.chernienko.pro
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorBlock = document.getElementById('errorBlock');
        const errorText = document.getElementById('errorText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.querySelector('span').innerText = 'Авторизация...';
            loginBtn.querySelector('i').className = 'fa-solid fa-circle-notch fa-spin';
            errorBlock.style.display = 'none';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    // Success, reload page (cookie is set, main route will serve index.html)
                    window.location.reload();
                } else {
                    // Show error
                    showError(data.detail || 'Неверный логин или пароль');
                }
            } catch (err) {
                console.error('Error logging in:', err);
                showError('Ошибка сети или сервера. Пожалуйста, попробуйте позже.');
            } finally {
                // Reset button state
                loginBtn.disabled = false;
                loginBtn.querySelector('span').innerText = 'Войти в систему';
                loginBtn.querySelector('i').className = 'fa-solid fa-arrow-right-to-bracket';
            }
        });

        function showError(msg) {
            errorText.innerText = msg;
            errorBlock.style.display = 'flex';
        }
    </script>
</body>
</html>
