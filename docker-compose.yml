version: '3.8'

services:
  generator-kreo:
    build: .
    container_name: generator-kreo-app
    ports:
      - "8005:8000"
    volumes:
      - ./data:/app/data
    networks:
      - default
      - dokploy-net
    environment:
      - GEMINI_PROXY=http://warp:1080
    restart: always

networks:
  dokploy-net:
    external: true
    name: dokploy-network

